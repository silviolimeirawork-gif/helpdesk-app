<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://java.sun.com/jsf/html"
      xmlns:p="http://primefaces.org/ui">
<h:head>
    <title>Login - Helpdesk</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f0f0f0; margin: 0; }
        .login-panel {
            width: 400px;
            margin: 100px auto;
            padding: 30px;
            background: white;
            border-radius: 8px;
            box-shadow: 0 0 15px rgba(0,0,0,0.15);
        }
        .login-panel h2 {
            text-align: center;
            margin-top: 0;
            color: #333;
        }
        .login-panel label {
            display: block;
            margin-top: 15px;
            font-weight: bold;
        }
        .login-panel input {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
            font-size: 14px;
        }
        .login-panel input:focus {
            border-color: #007ad9;
            outline: none;
            box-shadow: 0 0 5px rgba(0,122,217,0.5);
        }
        .login-panel button {
            width: 100%;
            padding: 12px;
            background: #007ad9;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 20px;
        }
        .login-panel button:hover {
            background: #005fb1;
        }
        .error {
            color: #d32f2f;
            background: #ffebee;
            padding: 10px;
            border-radius: 4px;
            margin-bottom: 15px;
            display: none;
        }
        .logout-btn {
            margin-top: 10px;
            width: 100%;
        }
    </style>
</h:head>
<h:body>
    <div class="login-panel">
        <h2>Acesso ao Sistema</h2>

        <div class="error" id="errorMessage">
            Usuário ou senha inválidos.
        </div>

        <form action="${pageContext.request.contextPath}/login" method="post">
            <label for="username">Usuário</label>
            <input type="text" id="username" name="username" placeholder="Digite seu usuário" required="required" />

            <label for="password">Senha</label>
            <input type="password" id="password" name="password" placeholder="Digite sua senha" required="required" />

            <button type="submit">Entrar</button>
        </form>

        <p:commandButton value="Sair" action="#{loginBean.logout}" immediate="true"
                         style="width:100%; margin-top:10px;" />
    </div>

    <script>
        if (window.location.search.indexOf('error=true') > -1) {
            document.getElementById('errorMessage').style.display = 'block';
        }
    </script>
</h:body>
</html>
